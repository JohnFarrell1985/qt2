version: "3.8"

services:
  qt-api:
    build: .
    container_name: qt-quant-api
    ports:
      - "${API_PORT:-8012}:${API_PORT:-8012}"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./macro_env.json:/app/macro_env.json
    command: >
      python -m uvicorn src.api.main:app
      --host 0.0.0.0
      --port ${API_PORT:-8012}
      --workers ${UVICORN_WORKERS:-2}
      --timeout-keep-alive 30
      --limit-concurrency 100
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:${API_PORT:-8012}/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  qt-scheduler:
    build: .
    container_name: qt-quant-scheduler
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./macro_env.json:/app/macro_env.json
    command: ["python", "-m", "scripts.run_scheduler"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

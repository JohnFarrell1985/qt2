name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: qt_test
          POSTGRES_USER: qt_test
          POSTGRES_PASSWORD: qt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://qt_test:qt_test@localhost:5432/qt_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Test
        run: pytest tests/ --cov=src --cov-report=xml -x --ignore=tests/e2e
      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

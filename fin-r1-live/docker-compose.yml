version: '3.8'

# 环境变量文件（如需自定义配置，复制 .env.example 为 .env 并修改）
# 默认使用 .env 文件中的配置，或手动设置环境变量

services:
  # 数据同步服务（自动检查并下载历史数据，支持断点续传）
  data-hub:
    build:
      context: ./data-hub
      dockerfile: Dockerfile
    container_name: finr1-datahub
    env_file:
      - .env
    environment:
      # 默认数据库连接（可被 .env 覆盖）
      - DATABASE_URL=${DATABASE_URL:-postgresql://game_agents:1234+asdf@123.60.11.74:5432/finr1_data}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # 下载配置（从 .env 读取，有默认值）
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-1}
      - REQUEST_DELAY=${REQUEST_DELAY:-2.0}
      - BATCH_SIZE_DOWNLOAD=${BATCH_SIZE_DOWNLOAD:-20}
      - BATCH_PAUSE=${BATCH_PAUSE:-10}
      - AKSHARE_TIMEOUT=${AKSHARE_TIMEOUT:-90}
      - MAX_DOWNLOAD_RETRIES=${MAX_DOWNLOAD_RETRIES:-3}
    volumes:
      - ./data-hub/logs:/app/logs
    # 每次启动自动检测并执行断点续传
    # - 全新部署：自动下载所有股票数据
    # - 中断恢复：自动从断点继续下载
    # - 失败重试：自动重试失败的任务（最多3次）
    # - 增量更新：自动下载最新数据
    # 完成后正常退出，失败时根据 restart: on-failure 策略自动重启
    restart: on-failure
    network_mode: host
    deploy:
      restart_policy:
        condition: on-failure
        delay: 30s  # 失败后30秒再试，给网络恢复时间
        max_attempts: 10  # 最多重试10次，确保数据最终完整

  # 实时API中间层（依赖vLLM和历史数据）
  api-middleware:
    build:
      context: ./api-middleware
      dockerfile: Dockerfile
    container_name: finr1-middleware
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://172.17.0.1:8010}
      - VLLM_MODEL=${VLLM_MODEL:-/models/Fin-R1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://game_agents:1234+asdf@123.60.11.74:5432/finr1_data}
      - ENABLE_DB_HISTORY=${ENABLE_DB_HISTORY:-true}
      - ENABLE_REALTIME_API=${ENABLE_REALTIME_API:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8012:8012"
    network_mode: host
    # 注意: 请确保vLLM服务已在运行（http://172.17.0.1:8010）
    # 移除depends_on因为vLLM需要nvidia-docker2，需手动启动
    restart: unless-stopped

  # Web UI（对接中间层）
  fin-r1-webui:
    image: yidadaa/chatgpt-next-web:latest
    container_name: fin-r1-webui
    ports:
      - "8011:3000"
    environment:
      # BASE_URL: WebUI连接API中间层的地址
      - BASE_URL=${BASE_URL:-http://172.17.0.1:8012}
      - API_KEY=none
      - HOST=0.0.0.0
      - PORT=3000
      - DEFAULT_MODEL=Fin-R1-Live
      - DISABLE_OPENAI_MODEL_LIST=true
      - CUSTOM_MODELS=Fin-R1-Live
    depends_on:
      - api-middleware
    restart: unless-stopped
    # 使用桥接网络（默认），使端口映射生效
    # network_mode: host

# 注意：volumes 不需要定义，使用 host 网络模式和 bind mount
# GPU支持需要安装 nvidia-docker2 并配置 docker daemon
# 安全提示：生产环境建议使用 .env 文件管理密码，不要硬编码
